    <style>
        .art-layout {
            display: flex;
            gap: 48px;
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 32px 80px;
            align-items: flex-start;
        }

        /* Sidebar */
        .art-sidebar {
            position: sticky;
            top: 32px;
            width: 140px;
            flex-shrink: 0;
            padding-top: 4px;
        }

        .sidebar-label {
            font-family: 'Inconsolata', serif;
            font-size: 11px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #aaa;
            margin-bottom: 14px;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .sidebar-btn {
            background: none;
            border: none;
            padding: 7px 10px;
            border-radius: 6px;
            font-family: 'DiaType', sans-serif;
            font-size: 14px;
            font-weight: 400;
            color: #888;
            text-align: left;
            cursor: url('../assets/icons/cursor.svg') 10 10, auto;
            transition: background 0.15s ease, color 0.15s ease;
            position: relative;
        }

        .sidebar-btn::before {
            content: "";
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%) scaleY(0);
            width: 2px;
            height: 16px;
            background-color: #BFDF94;
            border-radius: 2px;
            transition: transform 0.2s ease;
        }

        .sidebar-btn:hover {
            background: #f5f5f5;
            color: #333;
        }

        .sidebar-btn.active {
            color: #222;
            font-weight: 500;
            background: #f5f5f5;
        }

        .sidebar-btn.active::before {
            transform: translateY(-50%) scaleY(1);
        }

        /* Gallery area */
        .art-content {
            flex: 1;
            min-width: 0;
        }

        .art-section {
            display: none;
        }

        .art-section.visible {
            display: block;
        }

        .art-section-heading {
            font-family: 'InstrumentSerif', serif;
            font-size: 38px;
            font-weight: 400;
            margin: 0 0 24px 0;
        }

        /* Two-column masonry grid */
        .gallery-columns {
            display: flex;
            gap: 1.2rem;
        }

        .gallery-col {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            flex: 1;
        }

        .gallery-col img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 6px;
            transition: transform 0.2s ease;
        }

        .gallery-col img:hover {
            transform: scale(0.985);
        }

        /* Hover pill (illustration captions) */
        .illustration-hover-pill {
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            max-width: min(280px, calc(100vw - 24px));
            padding: 0.4rem 0.85rem;
            border-radius: 9999px;
            font-family: 'DiaType', sans-serif;
            font-size: 13px;
            font-weight: 300;
            color: #1a1a1a;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(0, 0, 0, 0.12);
            box-shadow: 0 2px 14px rgba(0, 0, 0, 0.1);
            pointer-events: none;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.12s ease, visibility 0.12s ease;
            white-space: normal;
            word-wrap: break-word;
        }

        .illustration-hover-pill.is-visible {
            opacity: 1;
            visibility: visible;
        }

        /* Responsive */
        @media (max-width: 680px) {
            .art-layout {
                flex-direction: column;
                padding: 0 20px 60px;
            }

            .art-sidebar {
                position: static;
                width: 100%;
                display: flex;
                align-items: center;
                gap: 8px;
                flex-wrap: wrap;
            }

            .sidebar-label {
                display: none;
            }

            .sidebar-nav {
                flex-direction: row;
                flex-wrap: wrap;
                gap: 6px;
            }

            .sidebar-btn::before {
                display: none;
            }

            .sidebar-btn.active {
                background: #BFDF94;
                color: #2a4a10;
            }
        }
    </style>
</head>

    <script>
        (function () {
            var buttons = document.querySelectorAll('.sidebar-btn');
            var sections = document.querySelectorAll('.art-section');

            buttons.forEach(function (btn) {
                btn.addEventListener('click', function () {
                    var tab = btn.getAttribute('data-tab');

                    buttons.forEach(function (b) { b.classList.remove('active'); });
                    sections.forEach(function (s) { s.classList.remove('visible'); });

                    btn.classList.add('active');
                    document.getElementById('tab-' + tab).classList.add('visible');
                });
            });

            var pill = document.getElementById('illustration-hover-pill');
            var offsetX = 18, offsetY = 18;

            function place(e) {
                pill.style.left = e.clientX + offsetX + 'px';
                pill.style.top = e.clientY + offsetY + 'px';
            }

            document.querySelectorAll('img[data-desc]').forEach(function (img) {
                img.addEventListener('mouseenter', function (e) {
                    pill.textContent = img.getAttribute('data-desc') || '';
                    pill.classList.add('is-visible');
                    pill.setAttribute('aria-hidden', 'false');
                    place(e);
                });
                img.addEventListener('mousemove', place);
                img.addEventListener('mouseleave', function () {
                    pill.classList.remove('is-visible');
                    pill.setAttribute('aria-hidden', 'true');
                    pill.textContent = '';
                });
            });
        })();
    </script>
